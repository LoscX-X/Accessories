name: Accessory
version: '${version}'
main: com.blanoir.accessory.Accessory
api-version: '1.21'
softdepend: [AuraSkills, PlaceholderAPI, MythicMobs, AttributePlus]
commands:
  shield:
    description: 调整当前物理护盾
    usage: /shield <give|givep> <me|player|all> <value>
    permission: accessory.shield
  magicShield:
    description: 调整当前魔法护盾
    usage: /magicshield <give|givep> <me|player|all> <value>
    permission: accessory.magicshield
  accessory:
    description: 打开你的饰品背包，或执行管理命令
    usage: /accessory [open|reload|clear <player>|view <player>]
    aliases: [ acc, acre ]

permissions:
  accessory.reload:
    description: Allow Reloaded
    default: op
  accessory.clear:
    description: Allow clearing player accessories
    default: op
  accessory.view:
    description: Allow opening and editing another player's accessory inventory
    default: op
  accessory.shield:
    description: Allow adjusting physical shield
    default: op
  accessory.magicShield:
    description: Allow adjusting magic shield
    default: op
