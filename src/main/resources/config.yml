# 饰品背包 GUI 顶部显示的标题（支持变量 {page} / {max_page}）
title: "<gradient:#00ffa6:#00d1ff><b>Accessories {page}/{max_page}</b></gradient>"

# 每页 GUI 大小（格子数），必须是 9 的倍数（最小 9，最大 54）
size: 9

# 总页数
pages: 2

# 语言文件名称（位于 /plugins/Accessory/Lang 目录下，不带 .yml 后缀）
# 默认可用：en_US, zh_CN
Lang: "en_US"

# 是否开启启动调试日志
debug-mode: false

# 是否开启饰品技能调试日志
skill-debug: false

# 属性挂钩模式（默认关闭）
# false: 使用 AuraSkills trait（如果存在）
# true: 只使用 AttributePlus，忽略 AuraSkills trait
attribute-plus:
  enable: false

# 存储方式: yml 或 mysql
database:
  type: "yml"
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "minecraft"
    username: "root"
    password: "password"
    pool-size: 10
    min-idle: 2
    max-lifetime: 1800000
    connection-timeout: 10000
    idle-timeout: 600000

# 插槽规则：每个页面可配置每个槽位允许放入的物品 lore 关键词
# 同时支持 permission 检测
Accessory:
  page_1:
    "1":
      # permission: "accessory.slot.ring"
      lore:
        - "[Ring]"
    "3":
      lore:
        - "[Necklace]"
    "5":
      lore:
        - "[Bracelet]"
    "7":
      lore:
        - "[Talisman]"
  page_2:
    "1":
      lore:
        - "[Ring]"

# 锁定槽位边框（支持按页面配置）
frame:
  page_1:
    slots: [0, 2, 4, 6, 8]
  page_2:
    slots: [0, 2, 4, 6, 8]
  item:
    type: "BLACK_STAINED_GLASS_PANE"
    custom-model-data: 12345
    hide-tooltip: true
    name: "<gray>Locked"
    lore:
      - "<dark_gray>Slot is locked"

# 上一页按钮配置
pre_page:
  slot: 0
  item:
    type: "ARROW"
    custom-model-data: 12345
    hide-tooltip: true
    name: "<gray>Previous Page"
    lore:
      - "<dark_gray>Go to previous page"

# 下一页按钮配置
next_page:
  slot: 8
  item:
    type: "ARROW"
    custom-model-data: 12345
    hide-tooltip: true
    name: "<gray>Next Page"
    lore:
      - "<dark_gray>Go to next page"

# 通过 AccessoryService API 在运行时禁用的槽位样式
disabled-slot:
  item:
    type: "RED_STAINED_GLASS_PANE"
    hide-tooltip: true
    name: "<red>Slot Disabled"
    lore:
      - "<dark_red>This slot is disabled"

# 物理护盾恢复设置
OUT_OF_COMBAT_SECONDS: 12
SHIELD_REGEN_PERCENT: 0.10

# 魔法护盾恢复设置
MAGIC_SHIELD_OUT_OF_COMBAT_SECONDS: 12
MAGIC_SHIELD_REGEN_PERCENT: 0.10

# 是否显示吸血效果的调试演示数值
Life_Steal_demonstrate: false
