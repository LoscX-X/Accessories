# 饰品页面配置文件，必须填写 page，否则插件会在控制台报错并跳过此文件。
# 文件名可自定义，例如 extra.yml，实际页码由 page 决定。
page: 2

size: 9

# 当前页通过 AccessoryService API 在运行时禁用的槽位样式
disabled-slot:
  item:
    type: "RED_STAINED_GLASS_PANE"
    hide-tooltip: true
    name: "<red>Slot Disabled"
    lore:
      - "<dark_red>This slot is disabled"

Accessory:
  "1":
    lore:
      - "[Ring]"

# drag: "command" 时点击该物品会执行 command.console / command.player；也支持 "pre_page" / "next_page" 翻页。
frame:
  locked:
    slots: [2, 4, 6]
    type: "BLACK_STAINED_GLASS_PANE"
    custom-model-data: 12345
    hide-tooltip: true
    name: "<gray>Locked"
    lore:
      - "<dark_gray>Slot is locked"

  previous_button:
    slots: [0]
    type: "ARROW"
    custom-model-data: 12345
    hide-tooltip: true
    name: "<gray>Previous Page"
    lore:
      - "<dark_gray>Go to previous page"
    drag: "pre_page"

  command_button:
    slots: [7]
    type: "BOOK"
    hide-tooltip: false
    name: "<aqua>Command Button"
    lore:
      - "<gray>Click to run configured commands"
    drag: "command"
    command:
      console:
        - "say {player} clicked accessory page {page} slot {slot}"
      player:
        - "help"
